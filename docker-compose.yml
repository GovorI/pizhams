version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pizhams-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pizhams
      POSTGRES_PASSWORD: pizhams_password
      POSTGRES_DB: pizhams
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pizhams']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pizhams-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pizhams.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  postgres_data:
